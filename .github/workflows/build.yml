name: mi primer build
on: 
  push: 
    branch: [main]
jobs:
  buid:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name : login dockehub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build an push
        uses: docker/build-push-action@v5
        with:  
          context: .
          push: true
